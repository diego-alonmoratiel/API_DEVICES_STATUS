apiVersion: v1
kind: Service
metadata:
  name: {{ include "device-management-api.fullname" . }}
  labels:
    {{- include "device-management-api.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "device-management-api.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP